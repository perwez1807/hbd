<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will you?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="stage">
    <div class="card">
      <p class="eyebrow">a question, for you</p>
      <h1>Will you go on a date<br>with me, Aditi Singh? <span class="cutie">(cutie)</span></h1>
      <p class="sub">Take your time. (Well — take your time on one of these buttons, anyway.)</p>
      <div class="buttons">
        <button id="yes">Yes, I'd love to 💛</button>
        <button id="no">No</button>
        <div class="dodge-msg" id="dodgeMsg"></div>
      </div>
    </div>
  </div>

  <div class="yes-screen" id="yesScreen">
    <div class="big">It's a date. 🌹</div>
    <p>I'll pick the time and place — you just have to show up looking however you want, because you'll be the best part of it either way.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
